<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Race Results</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a1a;
      color: #eee;
      padding: 20px;
      max-width: 900px;
      margin: 0 auto;
    }
    h1 { margin-bottom: 4px; }
    .subtitle { color: #999; margin-bottom: 24px; font-size: 14px; }

    #back-btn {
      display: none;
      background: #2a2a2a;
      color: #eee;
      border: 1px solid #444;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 16px;
      font-size: 14px;
    }
    #back-btn:hover { background: #333; }

    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid #333;
      text-align: left;
      font-size: 14px;
    }
    th {
      background: #2a2a2a;
      font-weight: 600;
    }

    .session-row {
      cursor: pointer;
    }
    .session-row:hover {
      background: #242424;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-race { background: #4a2a2a; color: #ff8080; }
    .badge-qualify { background: #2a3a4a; color: #80c0ff; }

    #status {
      color: #999;
      padding: 20px 0;
    }
    .error {
      color: #ff8080;
    }
  </style>
</head>
<body>
  <h1>Race Results</h1>
  <div class="subtitle">GT3forc3.com</div>

  <button id="back-btn">&larr; Back to sessions</button>
  <div id="status"></div>
  <div id="content"></div>

  <script>
    const WORKER_URL = "https://raspy-salad-d894.contact-eb9.workers.dev";

    const statusEl = document.getElementById("status");
    const contentEl = document.getElementById("content");
    const backBtn = document.getElementById("back-btn");

    backBtn.addEventListener("click", loadSessionList);

    function formatTimestamp(ts) {
      const date = new Date(ts);
      return date.toLocaleString(undefined, {
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit"
      });
    }

    async function loadSessionList() {
      backBtn.style.display = "none";
      statusEl.textContent = "Loading sessions...";
      statusEl.className = "";
      contentEl.innerHTML = "";

      try {
        const res = await fetch(WORKER_URL + "/api/v1/results");
        if (!res.ok) throw new Error("Server returned " + res.status);
        const data = await res.json();

        const sessions = (data.results || []).slice().sort(
          (a, b) => new Date(b.timestamp) - new Date(a.timestamp)
        );

        if (sessions.length === 0) {
          statusEl.textContent = "No sessions found.";
          return;
        }

        statusEl.textContent = "";

        const table = document.createElement("table");
        table.innerHTML = `
          <thead>
            <tr>
              <th>Date</th>
              <th>Type</th>
            </tr>
          </thead>
          <tbody></tbody>
        `;
        const tbody = table.querySelector("tbody");

        sessions.forEach(session => {
          const tr = document.createElement("tr");
          tr.className = "session-row";
          const badgeClass = session.session_type === "Race" ? "badge-race" : "badge-qualify";
          tr.innerHTML = `
            <td>${formatTimestamp(session.timestamp)}</td>
            <td><span class="badge ${badgeClass}">${session.session_type}</span></td>
          `;
          tr.addEventListener("click", () => loadSessionDetail(session));
          tbody.appendChild(tr);
        });

        contentEl.appendChild(table);
      } catch (err) {
        statusEl.textContent = "Error loading sessions: " + err.message;
        statusEl.className = "error";
      }
    }

    async function loadSessionDetail(session) {
      backBtn.style.display = "inline-block";
      statusEl.textContent = "Loading results...";
      statusEl.className = "";
      contentEl.innerHTML = "";

      try {
        const res = await fetch(WORKER_URL + session.download_url.replace(/^\/api\/v1/, "/api/v1"));
        if (!res.ok) throw new Error("Server returned " + res.status);
        const data = await res.json();

        statusEl.textContent = "";
        renderSessionDetail(session, data);
      } catch (err) {
        statusEl.textContent = "Error loading session detail: " + err.message;
        statusEl.className = "error";
      }
    }

    function renderSessionDetail(session, data) {
      const heading = document.createElement("h2");
      heading.textContent = `${session.session_type} — ${formatTimestamp(session.timestamp)}`;
      contentEl.appendChild(heading);

      // Try to find an array of driver/result entries in the response.
      // Different result formats may nest this differently, so check common spots.
      let entries = null;
      if (Array.isArray(data)) {
        entries = data;
      } else if (Array.isArray(data.Result)) {
        entries = data.Result;
      } else if (Array.isArray(data.results)) {
        entries = data.results;
      } else if (Array.isArray(data.entries)) {
        entries = data.entries;
      }

      if (!entries) {
        // Fallback: show raw JSON so we can see the actual shape and refine this.
        const pre = document.createElement("pre");
        pre.style.whiteSpace = "pre-wrap";
        pre.style.background = "#2a2a2a";
        pre.style.padding = "16px";
        pre.style.borderRadius = "6px";
        pre.style.fontSize = "13px";
        pre.textContent = JSON.stringify(data, null, 2);
        contentEl.appendChild(pre);
        return;
      }

      const table = document.createElement("table");
      table.innerHTML = `
        <thead>
          <tr>
            <th>#</th>
            <th>Driver</th>
            <th>Car</th>
            <th>Best Lap</th>
          </tr>
        </thead>
        <tbody></tbody>
      `;
      const tbody = table.querySelector("tbody");

      entries.forEach((entry, i) => {
        const driver = entry.DriverName || entry.driver || entry.name || "-";
        const car = entry.CarModel || entry.car || "-";
        const bestLap = entry.BestLap || entry.bestLap || entry.best_lap || "-";
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${i + 1}</td>
          <td>${driver}</td>
          <td>${car}</td>
          <td>${bestLap}</td>
        `;
        tbody.appendChild(tr);
      });

      contentEl.appendChild(table);
    }

    loadSessionList();
  </script>
</body>
</html>
